# coturn (RFC 5766/8656 TURN/STUN) config for the llama-distributed
# anycast edge tier.  Tuned for stateless, geographically distributed
# deployment where multiple edges share a single anycast IP and TURN
# clients land on whichever edge is closest by BGP.
#
# Each edge is a stand-alone process — no clustered state, no shared
# database.  TURN allocations are local to the edge that received the
# initial Allocate, and the same anycast IP must route subsequent
# packets back to that edge (i.e., the upstream router needs to
# preserve flow affinity at the BGP/ECMP layer).  Operators that
# can't guarantee 5-tuple stickiness must instead run anycast for
# STUN only and unicast for TURN.
#
# Auth model: ephemeral REST-style time-limited username/password
# pairs, signed against `static-auth-secret` below.  dist-server
# mints these on demand and hands them to rigs through the
# /api/turn-credential endpoint.  The shared secret never crosses
# the wire; only the time-limited HMAC does.
#
# Production operators must override:
#   - listening-ip / external-ip (per edge)
#   - realm (your domain)
#   - static-auth-secret (32+ random bytes; same on every edge)
#   - cert / pkey (TLS for TURNS — required by browsers behind HTTPS)

listening-port=3478
tls-listening-port=5349
alt-listening-port=0
alt-tls-listening-port=0

# Each edge sets its own listening-ip (the anycast IP bound on this
# host) and external-ip (the IP clients see — usually the same as
# listening-ip for anycast; differs only on multi-NIC unicast nodes).
listening-ip=$ANYCAST_IPV4
external-ip=$EDGE_PUBLIC_IPV4
# listening-ip=$ANYCAST_IPV6   # uncomment when shipping v6

# Relay ports.  Narrow band so firewalls can pinhole exactly this.
min-port=49152
max-port=65535

# Auth: REST-style ephemeral creds (RFC 5780 / draft-uberti-behave-turn-rest).
use-auth-secret
static-auth-secret=$DIST_TURN_AUTH_SECRET
realm=$DIST_TURN_REALM

# Long-running allocations should renew; refresh allows it.
allocation-default-lifetime=600
allocation-max-lifetime=3600
channel-lifetime=600
permission-lifetime=300

# Logging.  Stderr-only so the container collector picks it up.
log-file=stdout
no-loopback-peers
no-multicast-peers
syslog=false
simple-log

# Performance & DoS hygiene.
total-quota=10000
user-quota=200
bps-capacity=1000000000
max-bps=10000000
no-stdout-log
fingerprint
lt-cred-mech
no-tlsv1
no-tlsv1_1
cipher-list="ECDHE+AESGCM:ECDHE+CHACHA20:!aNULL:!MD5:!3DES"

# TLS (TURNS) — required for browsers visiting an HTTPS dist-server.
cert=/etc/coturn/certs/fullchain.pem
pkey=/etc/coturn/certs/privkey.pem

# Mobility (RFC 8016) — keep allocations alive when a phone hops Wi-Fi → LTE.
mobility

# Reject relay traffic destined for RFC 1918 / loopback to keep the
# edge from being used as a tunneling hop into operator-private nets.
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255

# Health: a Prometheus exporter sidecar reads coturn's CLI port.
cli-password=$DIST_TURN_CLI_PASSWORD
