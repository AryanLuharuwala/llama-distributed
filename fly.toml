# fly.toml — Fly.io deployment for llama-distributed control plane
# Deploy: fly launch --no-deploy && fly secrets set ... && fly deploy

app = "llama-distributed"
primary_region = "ord"

[build]
  dockerfile = "server/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 500
    soft_limit = 250

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Persistent volume for SQLite + model cache
[[mounts]]
  source = "llama_data"
  destination = "/data"
  initial_size = "10gb"

[env]
  DIST_ADDR = ":8080"
  DIST_DB = "/data/distpool.sqlite"
  DIST_MODELS_DIR = "/data/models"
  DIST_RELEASES_DIR = "/data/releases-cache"
  # Set these with: fly secrets set DIST_GITHUB_CLIENT=... DIST_GITHUB_SECRET=... DIST_SESSION_SECRET=...
  # DIST_PUBLIC_URL is set automatically by Fly via the app hostname

[[statics]]
  guest_path = "/app/static"
  url_prefix = "/static"
