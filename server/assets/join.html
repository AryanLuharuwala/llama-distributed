<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>join pool · surd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--void:#04060a;--hull:#0c1422;--line:#1a2740;--cyan:#5af0ff;--violet:#9b6bff;
  --magenta:#ff4d9b;--amber:#ffb547;--green:#52ffb1;--ink:#dfe7f5;--dim:#7b8ba8}
*{box-sizing:border-box}
html,body{margin:0;background:var(--void);color:var(--ink);font-family:"Sora",sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
body{
  background:
    radial-gradient(900px 600px at 70% 20%, rgba(155,107,255,.18), transparent 60%),
    radial-gradient(700px 500px at 20% 100%, rgba(90,240,255,.12), transparent 70%),
    repeating-linear-gradient(0deg, transparent 0 23px, rgba(26,39,64,.35) 23px 24px),
    repeating-linear-gradient(90deg, transparent 0 23px, rgba(26,39,64,.35) 23px 24px),
    var(--void);
}
.card{max-width:500px;width:100%;
  background:linear-gradient(180deg, rgba(12,20,34,.92), rgba(7,11,20,.85));
  border:1px solid var(--line);border-radius:18px;padding:42px 38px;
  box-shadow:0 30px 80px -20px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.04)}
.brand{font-family:"Major Mono Display",monospace;font-size:12px;letter-spacing:.18em;
  color:var(--cyan);display:flex;align-items:center;gap:10px}
.brand::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--cyan);
  box-shadow:0 0 14px var(--cyan);animation:beat 1.7s ease-in-out infinite}
@keyframes beat{50%{transform:scale(.6);opacity:.55}}
h1{font-family:"Major Mono Display",monospace;font-weight:400;font-size:34px;
  line-height:1.05;margin:18px 0 10px;letter-spacing:-.01em}
.sub{color:var(--dim);font-size:14px;line-height:1.55;margin:0 0 24px}

.invite{
  background:rgba(7,11,20,.6);border:1px solid var(--line);border-radius:12px;
  padding:18px;margin-bottom:22px
}
.row{display:flex;justify-content:space-between;align-items:center;gap:14px;
  font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--ink)}
.row + .row{margin-top:8px}
.row .k{color:var(--dim);font-size:11px;letter-spacing:.18em;text-transform:uppercase}
.pill{padding:3px 10px;border-radius:999px;font-size:11px;letter-spacing:.12em;text-transform:uppercase}
.pill.ok{background:rgba(82,255,177,.16);color:var(--green);border:1px solid rgba(82,255,177,.4)}
.pill.bad{background:rgba(255,77,155,.16);color:var(--magenta);border:1px solid rgba(255,77,155,.4)}
.pill.warn{background:rgba(255,181,71,.16);color:var(--amber);border:1px solid rgba(255,181,71,.4)}

.btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
  background:linear-gradient(135deg, var(--cyan), var(--violet));color:var(--void);
  font-family:"JetBrains Mono",monospace;font-weight:600;font-size:14px;letter-spacing:.04em;
  border:none;border-radius:12px;padding:14px;cursor:pointer;text-decoration:none;
  transition:transform .12s, box-shadow .12s}
.btn:hover{transform:translateY(-1px);box-shadow:0 12px 30px -10px rgba(90,240,255,.45)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn.alt{background:transparent;color:var(--ink);border:1px solid var(--line)}
.btn.alt:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:none}

.err{color:var(--magenta);font-family:"JetBrains Mono",monospace;font-size:12.5px;
  margin-top:14px;display:none}
.ok-box{display:none;text-align:center;padding:14px;border-radius:10px;margin-top:14px;
  background:rgba(82,255,177,.08);border:1px solid rgba(82,255,177,.35);color:var(--green);
  font-family:"JetBrains Mono",monospace;font-size:13px;line-height:1.6}
.foot{margin-top:24px;color:var(--dim);font-size:12px;line-height:1.55}
.foot a{color:var(--cyan);text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="brand">SURD // INVITE</div>
  <h1 id="title">checking invite…</h1>
  <p class="sub" id="sub">verifying the token, hold tight.</p>

  <div class="invite" id="invite" style="display:none">
    <div class="row"><span class="k">pool</span><span id="poolName">—</span></div>
    <div class="row"><span class="k">visibility</span><span id="poolVis">—</span></div>
    <div class="row"><span class="k">expires</span><span id="poolExp">—</span></div>
    <div class="row"><span class="k">status</span><span id="poolStatus" class="pill">—</span></div>
  </div>

  <button class="btn" id="acceptBtn" style="display:none">accept invite</button>
  <a class="btn" id="loginBtn" style="display:none" href="#">sign in to accept</a>
  <p class="err" id="err"></p>
  <div class="ok-box" id="okBox"></div>

  <div class="foot">
    Don't have surd installed? <a href="/install" id="installLink">grab the CLI →</a>
  </div>
</div>

<script>
const token = location.pathname.replace(/^\/join\//, "");
const $title = document.getElementById("title");
const $sub   = document.getElementById("sub");
const $inv   = document.getElementById("invite");
const $name  = document.getElementById("poolName");
const $vis   = document.getElementById("poolVis");
const $exp   = document.getElementById("poolExp");
const $st    = document.getElementById("poolStatus");
const $btn   = document.getElementById("acceptBtn");
const $login = document.getElementById("loginBtn");
const $err   = document.getElementById("err");
const $ok    = document.getElementById("okBox");
const $installLink = document.getElementById("installLink");

function fmtTime(t){
  if (!t) return "—";
  const d = new Date(t*1000);
  return d.toLocaleString();
}

(async () => {
  if (!token){
    $title.textContent = "no invite token";
    $sub.textContent = "this page expects /join/<token>";
    return;
  }

  let pool, signedIn = false;
  try{
    const r = await fetch("/api/invites/" + encodeURIComponent(token));
    if (!r.ok){ throw new Error((await r.text()) || ("HTTP " + r.status)); }
    pool = await r.json();
  }catch(e){
    $title.textContent = "invite not found";
    $sub.textContent = "this invite link is invalid or has been revoked.";
    return;
  }

  $title.textContent = "you've been invited";
  $sub.textContent = "review the pool below and accept to join.";
  $inv.style.display = "block";
  $name.textContent = pool.pool_name + " · #" + pool.pool_id;
  $vis.textContent  = pool.visibility;
  $exp.textContent  = fmtTime(pool.expires_at);

  let cls = "ok", txt = "valid";
  if (pool.status === "used")    { cls = "bad";  txt = "already used"; }
  if (pool.status === "expired") { cls = "warn"; txt = "expired"; }
  $st.className = "pill " + cls;
  $st.textContent = txt;

  // Forward pool id to the install page so the CLI auto-attaches.
  $installLink.href = "/install?pool=" + pool.pool_id + "&invite=" + encodeURIComponent(token);

  if (pool.status !== "ok") return;

  // Probe sign-in state.
  try{
    const r = await fetch("/api/me");
    if (r.ok){ const j = await r.json(); if (j && j.id) signedIn = true; }
  }catch(_){}

  if (signedIn){
    $btn.style.display = "flex";
    $btn.addEventListener("click", accept);
  } else {
    $login.style.display = "flex";
    $login.href = "/auth?next=" + encodeURIComponent(location.pathname);
  }
})();

async function accept(){
  $btn.disabled = true;
  $err.style.display = "none";
  try{
    const r = await fetch("/api/pools/join", {
      method:"POST", headers:{"content-type":"application/json"},
      body: JSON.stringify({ invite: token }),
    });
    if (!r.ok){ throw new Error((await r.text()) || ("HTTP " + r.status)); }
    const j = await r.json();
    $btn.style.display = "none";
    $ok.style.display = "block";
    $ok.innerHTML = "joined pool #" + j.pool_id + "<br/>redirecting to console…";
    setTimeout(() => { location.href = "/console"; }, 1400);
  }catch(e){
    $err.textContent = (e && e.message) ? e.message : "join failed";
    $err.style.display = "block";
    $btn.disabled = false;
  }
}
</script>
</body>
</html>
