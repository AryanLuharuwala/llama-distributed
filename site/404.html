<script>
  // Works for both apex-domain (github.io + custom domains) and project pages.
  (function () {
    var p = location.pathname;
    var seg = p.split("/").filter(Boolean);
    var root = "/";
    if (location.hostname.endsWith(".github.io") && seg.length > 0) {
      root = "/" + seg[0] + "/";
    }
    document.write('<base href="' + root + '">');
  })();
</script>
